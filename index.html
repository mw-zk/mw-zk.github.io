<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammed wael - حساباتي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .profile-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 40px 30px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 173, 181, 0.5);
            border: 3px solid #00adb5;
            background: #203a43;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 { font-size: 26px; margin: 0 0 10px 0; color: #00adb5; font-weight: 700; letter-spacing: 0.5px; }
        
        /* تنسيق الوصف الجديد المودرن */
        .bio { 
            font-size: 14px; 
            color: #e0e0e0; 
            margin: 0 0 30px 0; 
            line-height: 1.8; 
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .links-container { display: flex; flex-direction: column; gap: 15px; }
        
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; 
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .link-btn i {
            font-size: 20px; 
        }
        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: transparent;
        }
        /* ألوان التطبيقات عند التمرير */
        .link-btn.telegram:hover { background: #0088cc; color: white; }
        .link-btn.instagram:hover { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; }
        .link-btn.whatsapp:hover { background: #25D366; color: white; }
        .link-btn.phone:hover { background: #00b56c; color: white; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">
            <img src="me.jpg" alt="Muhammed wael">
        </div>
        
        <h1>Muhammed wael</h1>
        
        <p class="bio">
            20 | 🇮🇶<br>
            CIVIL ENGINEER<br>
            QGU<br>
            TECHIE<br>
            COLOURIST
        </p>
        
        <div class="links-container">
            <a href="https://t.me/mw_zk" target="_blank" class="link-btn telegram">
                <i class="fa-brands fa-telegram"></i> تيليجرام
            </a>
            <a href="https://www.instagram.com/mw_zk?igsh=MWZmNmltYXF6OWV2Nw==" target="_blank" class="link-btn instagram">
                <i class="fa-brands fa-instagram"></i> إنستغرام
            </a>
            <a href="https://wa.me/qr/HDNRRBHBMGCCO1" target="_blank" class="link-btn whatsapp">
                <i class="fa-brands fa-whatsapp"></i> واتساب
            </a>
            <a href="tel:07847100934" class="link-btn phone">
                <i class="fa-solid fa-phone"></i> إتصال هاتفي
            </a>
        </div>
    </div>

</body>
</html>
