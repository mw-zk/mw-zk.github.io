<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammed wael</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* هذي الإضافة الجديدة للخلفية */
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #000;
            /* طبقة تعتيم فوق الصورة حتى يبرز الزجاج والنص */
            background-blend-mode: darken;
            background-color: rgba(0, 0, 0, 0.6);
            
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .glass-card {
            width: 100%;
            max-width: 390px;
            /* زجاج بلوري */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 36px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 115px;
            height: 115px;
            border-radius: 28px;
            margin: 0 auto 25px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.5px; }
        
        .bio {
            font-size: 14px;
            color: #e0e0e0;
            line-height: 1.7;
            margin-bottom: 35px;
            font-weight: 500;
        }

        .links-container { display: flex; flex-direction: column; gap: 14px; }
        
        .link-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="avatar">
            <img src="me.jpg" alt="Muhammed wael">
        </div>
        
        <h1>Muhammed wael</h1>
        
        <p class="bio">
            20 | 🇮🇶<br>
            CIVIL ENGINEER<br>
            QGU<br>
            TECHIE<br>
            COLOURIST
        </p>
        
        <div class="links-container">
            <a href="https://t.me/mw_zk" target="_blank" class="link-btn"><i class="fa-brands fa-telegram"></i> Telegram</a>
            <a href="https://www.instagram.com/mw_zk?igsh=MWZmNmltYXF6OWV2Nw==" target="_blank" class="link-btn"><i class="fa-brands fa-instagram"></i> Instagram</a>
            <a href="https://wa.me/qr/HDNRRBHBMGCCO1" target="_blank" class="link-btn"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
            <a href="tel:07847100934" class="link-btn"><i class="fa-solid fa-phone"></i> Call Me</a>
        </div>
    </div>

</body>
</html>
